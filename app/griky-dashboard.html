<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Griky Fábrica</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#22304C; --navy2:#1a2539; --navy3:#131d2e;
  --red:#FF2D55; --red2:#e01f45;
  --green:#2BC168; --yellow:#F5A623; --gray:#667078;
  --light:#F6F7FB; --mid:#E2E8F0; --white:#ffffff;
  --ra:rgba(255,45,85,.10); --rb:rgba(255,45,85,.20);
  --ga:rgba(43,193,104,.10); --ya:rgba(245,166,35,.10);
  --na:rgba(34,48,76,.06);
  --r:12px; --sh:0 2px 14px rgba(34,48,76,.09);
  --sh2:0 8px 28px rgba(34,48,76,.14);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Roboto',sans-serif;background:var(--light);color:var(--navy);min-height:100vh;display:flex;flex-direction:column;}
h1,h2,h3{font-family:'Roboto',sans-serif;}

/* TOPBAR */
.topbar{background:var(--navy3);position:relative;overflow:hidden;flex-shrink:0;}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red) 0%,#ff6b8a 60%,transparent 100%);}
.topbar-inner{position:relative;z-index:1;display:flex;align-items:center;padding:0 28px;height:56px;gap:16px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:28px;height:28px;border-radius:6px;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:'Roboto',sans-serif;font-weight:800;font-size:14px;color:var(--white);}
.logo-name{font-family:'Roboto',sans-serif;font-weight:700;font-size:16px;color:var(--white);}
.logo-sep{width:1px;height:16px;background:rgba(255,255,255,.15);margin:0 4px;}
.logo-sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.5px;text-transform:uppercase;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.btn-sm{padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);font-family:'Roboto',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
.btn-sm:hover{background:rgba(255,255,255,.08);color:var(--white);}

/* CONTROL BAR */
.ctrlbar{background:var(--navy2);padding:12px 28px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;flex-wrap:wrap;}
.ctrl-field{display:flex;flex-direction:column;gap:3px;}
.ctrl-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.35);}
.ctrl-select{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:6px 10px;font-family:'Roboto',sans-serif;font-size:12px;color:var(--white);outline:none;appearance:none;cursor:pointer;min-width:160px;}
.ctrl-select option{background:var(--navy);}
.ctrl-sep{width:1px;height:32px;background:rgba(255,255,255,.08);}

/* VISTA TABS */
.view-tabs{display:flex;gap:4px;margin-left:auto;}
.view-tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;color:rgba(255,255,255,.45);cursor:pointer;transition:all .2s;border:1px solid transparent;}
.view-tab:hover{color:rgba(255,255,255,.8);}
.view-tab.active{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.15);color:var(--white);}

/* FECHA */
.fecha-badge{font-size:11px;color:rgba(255,255,255,.35);font-weight:400;}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:24px 28px;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:var(--mid);border-radius:2px;}

/* ── GLOBAL STATS ── */
.global-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:24px;}
.gstat{background:var(--white);border:1px solid var(--mid);border-radius:var(--r);padding:16px 14px;box-shadow:var(--sh);text-align:center;position:relative;overflow:hidden;}
.gstat::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;}
.gstat.total::before{background:var(--navy);}
.gstat.verde::before{background:var(--green);}
.gstat.amarillo::before{background:var(--yellow);}
.gstat.rojo::before{background:var(--red);}
.gstat.gris::before{background:#888;}
.gstat.sprint::before{background:#7EC8E3;}
.gstat.ritmo::before{background:#B19CD9;}
.gstat.cursos-plan::before{background:#7c3aed;}
.gstat.cursos-pct::before{background:#3b82f6;}
.gstat.valor::before{background:#10b981;}
.gstat.ppto::before{background:#f59e0b;}
.gstat.ac::before{background:#ef4444;}
.gstat.margen::before{background:#8b5cf6;}
.gstat-val{font-family:'Roboto',sans-serif;font-size:28px;font-weight:800;color:var(--navy);line-height:1;margin-bottom:4px;}
.gstat-val.gstat-val-money{font-size:22px;}
.gstat-val.green{color:var(--green);}
.gstat-val.yellow{color:var(--yellow);}
.gstat-val.red{color:var(--red);}
.gstat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);}
.gstat-sub{font-size:10px;color:var(--gray);margin-top:3px;font-weight:300;}

/* ── ED SECTION ── */
.ed-section{margin-bottom:28px;}
.ed-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.ed-title{font-family:'Roboto',sans-serif;font-size:16px;font-weight:800;color:var(--navy);}
.ed-pm{font-size:12px;color:var(--gray);font-weight:400;}
.ed-line{flex:1;height:1px;background:var(--mid);}
.ed-total{font-size:11px;color:var(--gray);}

/* ── PROYECTO CARD ── */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}

.pcard{background:var(--white);border:1px solid var(--mid);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;transition:all .2s;cursor:default;}
.pcard:hover{box-shadow:var(--sh2);transform:translateY(-2px);}
.pcard-stripe{height:4px;}
.pcard-stripe.verde{background:var(--green);}
.pcard-stripe.amarillo{background:var(--yellow);}
.pcard-stripe.rojo{background:linear-gradient(90deg,var(--red) 0%,#ff6b8a 100%);}

.pcard-head{padding:16px 18px 12px;}
.pcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
.pcard-name{font-family:'Roboto',sans-serif;font-size:14px;font-weight:700;color:var(--navy);line-height:1.3;}
.pcard-client{font-size:11px;color:var(--gray);margin-top:2px;}
.sem-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0;}
.sem-badge.verde{background:var(--ga);color:#1e9a56;}
.sem-badge.amarillo{background:var(--ya);color:#c47d00;}
.sem-badge.rojo{background:var(--ra);color:var(--red);}
.sem-badge.gris{background:#e8e8e8;color:#888;}
.pcard-stripe.gris{background:linear-gradient(135deg,#bbb,#999);}
.prog-fill.gris{background:#bbb;}

/* PROGRESS */
.pcard-progress{margin-bottom:12px;}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.prog-label{font-size:11px;color:var(--gray);font-weight:500;}
.prog-pct{font-family:'Roboto',sans-serif;font-size:13px;font-weight:700;color:var(--navy);}
.prog-bar{height:6px;background:var(--light);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.prog-fill.verde{background:var(--green);}
.prog-fill.amarillo{background:var(--yellow);}
.prog-fill.rojo{background:var(--red);}

/* METRICS ROW */
.pcard-metrics{display:flex;gap:0;border-top:1px solid var(--mid);}
.metric{flex:1;padding:10px 12px;text-align:center;border-right:1px solid var(--mid);}
.metric:last-child{border-right:none;}
.metric-val{font-family:'Roboto',sans-serif;font-size:14px;font-weight:700;color:var(--navy);}
.metric-val.ok{color:var(--green);}
.metric-val.warn{color:var(--yellow);}
.metric-val.bad{color:var(--red);}
.metric-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);margin-top:2px;}

/* ALERT BANNER */
.alert-banner{background:var(--ra);border:1px solid var(--rb);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);display:flex;align-items:center;gap:8px;margin:0 18px 14px;}
.alert-banner.warn{background:var(--ya);border-color:rgba(245,166,35,.3);color:#c47d00;}

/* ── TABLA DETALLE ── */
.detail-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.detail-table th{text-align:left;padding:9px 12px;color:var(--gray);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid var(--mid);white-space:nowrap;}
.detail-table td{padding:11px 12px;border-bottom:1px solid rgba(226,232,240,.5);vertical-align:middle;}
.detail-table tr:hover td{background:rgba(246,247,251,.8);}
.detail-table tr:last-child td{border-bottom:none;}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0;}
.dot.verde{background:var(--green);}
.dot.amarillo{background:var(--yellow);}
.dot.rojo{background:var(--red);}

.pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;}
.pill.ok{background:var(--ga);color:#1e9a56;}
.pill.warn{background:var(--ya);color:#c47d00;}
.pill.bad{background:var(--ra);color:var(--red);}
.pill.neutral{background:var(--na);color:var(--navy);}

/* ── EMPTY ── */
.empty-view{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;opacity:.4;}
.empty-icon{font-size:48px;}
.empty-title{font-family:'Roboto',sans-serif;font-size:18px;font-weight:700;}
.empty-sub{font-size:13px;color:var(--gray);text-align:center;line-height:1.6;max-width:320px;}

/* MINI PROG */
.mini-prog{display:flex;align-items:center;gap:8px;}
.mini-bar{flex:1;height:5px;background:var(--mid);border-radius:3px;overflow:hidden;min-width:60px;}
.mini-fill{height:100%;border-radius:3px;}
.mini-fill.verde{background:var(--green);}
.mini-fill.amarillo{background:var(--yellow);}
.mini-fill.rojo{background:var(--red);}
.mini-pct{font-family:'Roboto',sans-serif;font-size:12px;font-weight:700;color:var(--navy);width:32px;text-align:right;}

/* RITMO ICON */
.ritmo-icon{font-size:13px;}

/* SPRINT RING */
.ring-wrap{position:relative;width:44px;height:44px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Roboto',sans-serif;font-size:10px;font-weight:800;color:var(--navy);}

/* SECTION TOGGLE */
.sec-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.sec-toggle-chevron{font-size:12px;color:var(--gray);transition:transform .2s;}
.sec-toggle.open .sec-toggle-chevron{transform:rotate(90deg);}

/* === FICHA REDESIGN (2026-05-04) ============================================ */
.ficha-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px;}
.pcard.ficha{display:flex;flex-direction:column;}
.ficha .pcard-head{padding:18px 20px 12px;}
.ficha .pcard-cliente-label{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gray);margin-bottom:2px;}
.ficha .pcard-cliente{font-family:'Roboto',sans-serif;font-size:20px;font-weight:800;color:var(--navy);line-height:1.15;letter-spacing:-0.3px;margin-bottom:4px;}
.ficha .pcard-proyecto{font-size:12px;font-weight:500;color:var(--gray);line-height:1.3;}
.ficha .pcard-entrega{font-size:11px;color:var(--gray);margin-top:4px;font-weight:400;}
.ficha .pcard-badges{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;}
.ficha .pm-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:var(--na);color:var(--navy);border-radius:999px;font-size:10px;font-weight:700;white-space:nowrap;}
.ficha .pm-pill::before{content:"";width:5px;height:5px;background:var(--navy);border-radius:50%;}
.ficha .status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.ficha .status-pill::before{content:"";width:5px;height:5px;border-radius:50%;}
.ficha .status-ok{background:var(--ga);color:#1e9a56;}
.ficha .status-ok::before{background:var(--green);}
.ficha .status-warn{background:var(--ya);color:#c47d00;}
.ficha .status-warn::before{background:var(--yellow);}
.ficha .status-overdue{background:var(--ra);color:var(--red);}
.ficha .status-overdue::before{background:var(--red);}
.ficha .status-closed{background:#e8e8e8;color:#888;}
.ficha .status-closed::before{background:#888;}
.ficha .progress-block{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 18px 12px;}
.ficha .progress{background:var(--light);border-radius:8px;padding:10px 12px;}
.ficha .progress-label{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;line-height:1.2;}
.ficha .progress-value{font-size:18px;font-weight:800;color:var(--navy);line-height:1;margin-bottom:6px;}
.ficha .progress-value.pendiente-val{font-size:11px;color:#aaa;font-weight:500;font-style:italic;}
.ficha .progress-bar{width:100%;height:5px;background:var(--mid);border-radius:999px;overflow:hidden;}
.ficha .progress-fill{height:100%;border-radius:999px;transition:width .4s ease;}
.ficha .progress-fill.verde{background:var(--green);}
.ficha .progress-fill.amarillo{background:var(--yellow);}
.ficha .progress-fill.rojo{background:var(--red);}
.ficha .progress-fill.gris{background:#bbb;}
.ficha .counts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--mid);border-top:1px solid var(--mid);border-bottom:1px solid var(--mid);}
.ficha .count-cell{background:var(--white);padding:10px 12px;}
.ficha .count-label{font-size:10px;color:var(--gray);margin-bottom:3px;line-height:1.2;}
.ficha .count-value{font-size:15px;font-weight:700;color:var(--navy);line-height:1.1;}
.ficha .count-value .total{font-size:11px;color:var(--gray);font-weight:500;}
.ficha .finance{padding:14px 18px 16px;display:flex;flex-direction:column;gap:10px;}
.ficha .finance-title{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gray);}
.ficha .money-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ficha .money{background:var(--light);border-radius:6px;padding:8px 10px;}
.ficha .money-label{font-size:9px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;line-height:1.2;}
.ficha .money-value{font-size:13px;font-weight:700;color:var(--navy);line-height:1.1;}
.ficha .margin-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ficha .margin-box{border-radius:8px;padding:10px 12px;border:1px solid var(--mid);}
.ficha .margin-box.planned{background:var(--light);}
.ficha .margin-box.actual{border-width:1.5px;}
.ficha .margin-box.actual.good{background:var(--ga);border-color:var(--green);}
.ficha .margin-box.actual.warn{background:var(--ya);border-color:var(--yellow);}
.ficha .margin-box.actual.bad{background:var(--ra);border-color:var(--red);}
.ficha .margin-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);margin-bottom:4px;}
.ficha .margin-value{font-size:18px;font-weight:800;color:var(--navy);line-height:1;}
.ficha .margin-delta{font-size:10px;font-weight:600;margin-top:3px;}
.ficha .delta-up{color:var(--green);}
.ficha .delta-down{color:var(--red);}
.ficha .delta-flat{color:var(--gray);}
.pendiente{display:inline-block;padding:1px 7px;background:#f0f0f0;color:#888;border-radius:4px;font-size:10px;font-weight:600;font-style:italic;letter-spacing:.3px;}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar" role="banner">
  <div class="topbar-inner">
    <div class="logo" aria-label="Griky Dashboard Fábrica">
      <div class="logo-mark" aria-hidden="true">G</div>
      <span class="logo-name">Griky</span>
      <div class="logo-sep" aria-hidden="true"></div>
      <span class="logo-sub">Dashboard · Fábrica</span>
    </div>
    <div class="topbar-right">
      <span class="fecha-badge" id="fechaBadge" aria-label="Fecha actual">—</span>
      <button class="btn-sm" onclick="window.location.href='griky-fabrica-hub.html'" aria-label="Volver al Hub">← Hub</button>
    </div>
  </div>
</header>

<!-- CONTROL BAR -->
<div class="ctrlbar" role="toolbar" aria-label="Filtros del dashboard">
  <div class="ctrl-field">
    <label class="ctrl-label" for="selPerfil">Perfil</label>
    <select class="ctrl-select" id="selPerfil" onchange="onPerfilChange()">
      <option value="director">Director de Fábrica</option>
      <option value="pm">Project Manager</option>

  </div>

  <div class="ctrl-sep" id="pmSep"></div>
  <div class="ctrl-field" id="pmField">
    <label class="ctrl-label" for="selED">Equipo Dedicado</label>
    <select class="ctrl-select" id="selED" onchange="render()">
      <option value="all">Todos los EDs</option>
      <option value="Sophia Pacheco">ED Sophia Pacheco</option>

      <option value="Margarita Rosales">ED Margarita Rosales</option>
      <option value="Marcela Osorio">ED Marcela Osorio</option>
      <option value="Jean Villegas">ED Jean Villegas</option>
      <option value="Jorge Osorio">ED Jorge Osorio</option>
    </select>
  </div>

  <div class="ctrl-sep"></div>
  <div class="ctrl-field">
    <label class="ctrl-label" for="selSem">Semáforo</label>
    <select class="ctrl-select" id="selSem" onchange="render()">
      <option value="all">Todos</option>
      <option value="verde">🟢 Verde</option>
      <option value="amarillo">🟡 Amarillo</option>
      <option value="rojo">🔴 Rojo</option>
      <option value="gris">⚪ Sin datos</option>
    </select>
  </div>

  <div class="ctrl-sep"></div>
  <div class="ctrl-field">
    <label class="ctrl-label" for="selSort">Ordenar por</label>
    <select class="ctrl-select" id="selSort" onchange="render()">
      <option value="default">Por defecto (semáforo)</option>
      <option value="overdue">Vencidos primero</option>
      <option value="dueSoon">Próximos a vencer</option>
      <option value="marginDesc">Mayor margen actual</option>
    </select>
  </div>

  <div class="view-tabs">
    <div class="view-tab active" id="vt-cards" onclick="setVista('cards')">⊞ Tarjetas</div>
    <div class="view-tab" id="vt-tabla" onclick="setVista('tabla')">☰ Tabla</div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="mainContent">
  <div class="empty-view">
    <div class="empty-icon">📊</div>
    <div class="empty-title">Cargando dashboard…</div>
  </div>
</div>

<script>

// ── HELPERS FICHA ────────────────────────────────────────────────────────────
function diasACierre(p){
  if(!p.fechaCierre) return null;
  const d = new Date(p.fechaCierre + 'T12:00:00');
  if(isNaN(d.getTime())) return null;
  const today = new Date();
  return Math.round((d - today) / (1000*60*60*24));
}
function entregaStatus(p){
  // Cerrado: avance global ≥ 100% o todos los recursos ejecutados
  const recOk = p.totalRec > 0 && p.recHechos >= p.totalRec;
  const cursosOk = p.cursos > 0 && p.cursosAprobados !== null && p.cursosAprobados >= p.cursos;
  if((recOk && cursosOk) || p.avance >= 100) return 'closed';
  const dias = diasACierre(p);
  if(dias === null) return 'none';
  if(dias < 0) return 'overdue';
  if(dias <= 30) return 'warn';
  return 'ok';
}
function marginPlanCalc(p){
  if(p.valorContrato == null || p.presupuesto == null || p.valorContrato === 0) return null;
  return (p.valorContrato - p.presupuesto) / p.valorContrato;
}
function marginActCalc(p){
  if(p.valorContrato == null || p.costosEjec == null || p.valorContrato === 0) return null;
  return (p.valorContrato - p.costosEjec) / p.valorContrato;
}
function fmtMoney(v){
  if(v == null) return '—';
  const sign = v < 0 ? '-' : '';
  const abs = Math.abs(v);
  if(abs >= 1_000_000) return sign + '$' + (abs / 1_000_000).toFixed(1).replace('.', ',') + 'M';
  if(abs >= 1_000)     return sign + '$' + Math.round(abs / 1_000) + 'K';
  return sign + '$' + Math.round(abs);
}
function fmtMargin(v){
  if(v == null) return '—';
  return (v * 100).toFixed(1).replace('.', ',') + '%';
}
function fmtFechaCorta(iso){
  const d = new Date(iso + 'T12:00:00');
  if(isNaN(d.getTime())) return iso;
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}`;
}
function marginClassFn(act, plan){
  // Umbrales absolutos (2026-05-04): >=80% verde · >=65% amarillo · <65% rojo
  if(act == null) return '';
  if(act >= 0.80) return 'good';
  if(act >= 0.65) return 'warn';
  return 'bad';
}
function marginDeltaText(act, plan, status){
  if(act == null || plan == null) return '';
  const diff = (act - plan) * 100;
  if(status === 'closed' || Math.abs(diff) >= 1){
    if(diff > 0) return `<div class="margin-delta delta-up">▲ ${diff.toFixed(1).replace('.',',')} pp vs. plan</div>`;
    if(diff < 0) return `<div class="margin-delta delta-down">▼ ${Math.abs(diff).toFixed(1).replace('.',',')} pp vs. plan</div>`;
    return `<div class="margin-delta delta-flat">En línea con plan</div>`;
  }
  return `<div class="margin-delta delta-flat">Proyecto en curso</div>`;
}

// ── SEMÁFORO AUTOMÁTICO ──────────────────────────────────────────────────────
// Calcula el semáforo de cada proyecto comparando % avance vs % tiempo.
// Brecha = %tiempo - %avance.  Verde ≤10 | Amarillo 10–25 | Rojo >25
// Sin datos suficientes (sin fechas o totalRec=0) → 'gris'
(function calcSemaforos(){
  const hoy = new Date();
  Object.values(DATA).forEach(proyectos => {
    proyectos.forEach(p => {
      // Proyecto completado al 100% → siempre verde
      if(p.totalRec > 0 && p.recHechos >= p.totalRec){ p.sem = 'verde'; return; }
      // Sin datos para calcular → gris
      if(!p.fechaInicio || !p.fechaCierre || p.totalRec <= 0){ p.sem = 'gris'; return; }
      const inicio = new Date(p.fechaInicio);
      const cierre = new Date(p.fechaCierre);
      const duracion = cierre - inicio;
      if(duracion <= 0){ p.sem = 'gris'; return; }
      // % de tiempo transcurrido (clamped 0–100)
      const pctTiempo = Math.min(100, Math.max(0, (hoy - inicio) / duracion * 100));
      // % de avance en recursos
      const pctAvance = p.recHechos / p.totalRec * 100;
      // Brecha
      const brecha = pctTiempo - pctAvance;
      if(brecha <= 10) p.sem = 'verde';
      else if(brecha <= 25) p.sem = 'amarillo';
      else p.sem = 'rojo';
    });
  });
})();

      document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
      const tab = document.getElementById('vt-' + vista);
      if(tab) tab.classList.add('active');
    }
  } catch(e){}

  onPerfilChange();
})();

// ── PERFIL ────────────────────────────────────────────────────────────────────
function onPerfilChange(){
  const perfil = document.getElementById('selPerfil').value;
  const pmField = document.getElementById('pmField');
  const pmSep = document.getElementById('pmSep');
  const edSel = document.getElementById('selED');

  if(perfil === 'pm'){
    // PM ve solo su ED — ocultar "Todos"
    edSel.querySelector('option[value="all"]').disabled = true;
    if(edSel.value === 'all') edSel.value = 'Sophia Pacheco';
  } else {
    edSel.querySelector('option[value="all"]').disabled = false;
    edSel.value = 'all';
  }
  render();
}

// ── VISTA ─────────────────────────────────────────────────────────────────────
function setVista(v){
  vista = v;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('vt-'+v).classList.add('active');
  render();
}

// ── DATOS FILTRADOS ───────────────────────────────────────────────────────────
function getFiltered(){
  const ed = document.getElementById('selED').value;
  const sem = document.getElementById('selSem').value;

  let result = {};
  Object.entries(DATA).forEach(([pm, proyectos]) => {
    if(ed !== 'all' && pm !== ed) return;
    const filtered = proyectos.filter(p => sem === 'all' || p.sem === sem);
    if(filtered.length > 0) result[pm] = filtered;
  });
  return result;
}

function getAllProyectos(filtered){
  return Object.values(filtered).flat();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const filtered = getFiltered();
  const all = getAllProyectos(filtered);
  const main = document.getElementById('mainContent');

  if(all.length === 0){
    main.innerHTML = `<div class="empty-view"><div class="empty-icon">🔍</div><div class="empty-title">Sin proyectos</div><div class="empty-sub">No hay proyectos que coincidan con los filtros seleccionados.</div></div>`;
    return;
  }

  // ── Stats globales (recalculados sobre proyectos visibles) ──
  // Conteos de semáforo
  const nTotal    = all.length;
  const nVerde    = all.filter(p=>p.sem==='verde').length;
  const nAmarillo = all.filter(p=>p.sem==='amarillo').length;
  const nRojo     = all.filter(p=>p.sem==='rojo').length;
  const nGris     = all.filter(p=>p.sem==='gris').length;

  // Cursos: planeados y entregados (cuando hay datos)
  const totalCursosPlan  = all.reduce((a,p)=>a + (p.cursos > 0 ? p.cursos : 0), 0);
  const totalCursosAprob = all.reduce((a,p)=>a + (p.cursosAprobados !== null ? p.cursosAprobados : 0), 0);
  const pctCursos = totalCursosPlan > 0 ? Math.round(totalCursosAprob / totalCursosPlan * 100) : 0;

  // Finanzas (USD): valor contrato, presupuesto (BAC), costos ejecutados (AC), margen
  const totalValor = all.reduce((a,p)=>a + (p.valorContrato || 0), 0);
  const totalPpto  = all.reduce((a,p)=>a + (p.presupuesto   || 0), 0);
  const totalAC    = all.reduce((a,p)=>a + (p.costosEjec    || 0), 0);
  const margenActFabrica = totalValor > 0 ? (totalValor - totalAC) / totalValor : null;
  const pctEjecPpto = totalPpto > 0 ? Math.round(totalAC / totalPpto * 100) : 0;
  const margenColor = margenActFabrica == null ? '' :
                      margenActFabrica >= 0.80 ? 'green' :
                      margenActFabrica >= 0.65 ? 'yellow' : 'red';

  let html = `
  <div class="global-stats">
    <div class="gstat total">
      <div class="gstat-val">${nTotal}</div>
      <div class="gstat-label">Proyectos activos</div>
      <div class="gstat-sub">${Object.keys(filtered).length} equipo${Object.keys(filtered).length!==1?'s':''}</div>
    </div>
    <div class="gstat verde">
      <div class="gstat-val green">${nVerde}</div>
      <div class="gstat-label">🟢 Verde</div>
      <div class="gstat-sub">${Math.round(nVerde/nTotal*100)}% del portafolio</div>
    </div>
    <div class="gstat amarillo">
      <div class="gstat-val yellow">${nAmarillo}</div>
      <div class="gstat-label">🟡 Amarillo</div>
      <div class="gstat-sub">Requieren seguimiento</div>
    </div>
    <div class="gstat rojo">
      <div class="gstat-val red">${nRojo}</div>
      <div class="gstat-label">🔴 Rojo</div>
      <div class="gstat-sub">Atención inmediata</div>
    </div>
    <div class="gstat gris">
      <div class="gstat-val" style="color:#888">${nGris}</div>
      <div class="gstat-label">⚪ Sin datos</div>
      <div class="gstat-sub">Faltan fechas o recursos</div>
    </div>
    <div class="gstat cursos-plan">
      <div class="gstat-val">${totalCursosPlan}</div>
      <div class="gstat-label">📚 Cursos planeados</div>
      <div class="gstat-sub">${totalCursosAprob} entregados (${pctCursos}%)</div>
    </div>
    <div class="gstat cursos-pct">
      <div class="gstat-val ${pctCursos>=80?'green':pctCursos>=40?'yellow':'red'}">${pctCursos}%</div>
      <div class="gstat-label">📦 Avance cursos</div>
      <div class="gstat-sub">${totalCursosAprob}/${totalCursosPlan} entregados</div>
    </div>
    <div class="gstat valor">
      <div class="gstat-val gstat-val-money">${fmtMoney(totalValor)}</div>
      <div class="gstat-label">💼 Valor contrato</div>
      <div class="gstat-sub">Total fábrica</div>
    </div>
    <div class="gstat ppto">
      <div class="gstat-val gstat-val-money">${fmtMoney(totalPpto)}</div>
      <div class="gstat-label">📋 Presupuesto</div>
      <div class="gstat-sub">Total BAC</div>
    </div>
    <div class="gstat ac">
      <div class="gstat-val gstat-val-money">${fmtMoney(totalAC)}</div>
      <div class="gstat-label">💸 Ejecutado (AC)</div>
      <div class="gstat-sub">${pctEjecPpto}% del ppto</div>
    </div>
    <div class="gstat margen">
      <div class="gstat-val ${margenColor}">${margenActFabrica != null ? fmtMargin(margenActFabrica) : '—'}</div>
      <div class="gstat-label">📈 Margen actual</div>
      <div class="gstat-sub">Toda la fábrica</div>
    </div>
  </div>`;

  if(vista === 'cards'){
    html += renderCards(filtered);
  } else {
    html += renderTabla(filtered);
  }

  main.innerHTML = html;

  // Persistir filtros/orden en localStorage (chat CONFIGURACIÓN DASHBOARD 2026-05-04)
  try {
    localStorage.setItem('griky_dashboard_filtros_v1', JSON.stringify({
      perfil: document.getElementById('selPerfil').value,
      ed:     document.getElementById('selED').value,
      sem:    document.getElementById('selSem').value,
      sort:   (document.getElementById('selSort')||{}).value || 'default',
      vista:  vista,
    }));
  } catch(e){}
}

// ── VISTA CARDS (FICHA REDESIGN) ─────────────────────────────────────────────
function renderCards(filtered){
  const sortVal = (document.getElementById('selSort')||{}).value || 'default';
  let html = '';

  if(sortVal === 'default'){
    // Mantener agrupación por ED, ordenando por semáforo dentro de cada grupo
    const semOrder = {rojo:0,amarillo:1,verde:2,gris:3};
    Object.entries(filtered).forEach(([pm, proyectos]) => {
      const sorted = [...proyectos].sort((a,b)=>semOrder[a.sem]-semOrder[b.sem]);
      html += `
      <div class="ed-section">
        <div class="ed-header">
          <div>
            <div class="ed-title">ED ${pm}</div>
            <div class="ed-pm">${sorted.length} proyecto${sorted.length!==1?'s':''} activo${sorted.length!==1?'s':''}</div>
          </div>
          <div class="ed-line"></div>
          <div class="ed-total">${sorted.filter(p=>p.sem==='verde').length}🟢 ${sorted.filter(p=>p.sem==='amarillo').length}🟡 ${sorted.filter(p=>p.sem==='rojo').length}🔴 ${sorted.filter(p=>p.sem==='gris').length}⚪</div>
        </div>
        <div class="ficha-grid">`;
      sorted.forEach(p => { html += renderFichaCard(p, false); });
      html += `</div></div>`;
    });
  } else {
    // Lista plana ordenada según el criterio
    const all = Object.entries(filtered).flatMap(([pm, proyectos]) =>
      proyectos.map(p => ({...p, pm}))
    );
    const statusOrderOverdue = { overdue:0, warn:1, ok:2, none:3, closed:4 };
    const statusOrderDueSoon = { warn:0, overdue:1, ok:2, none:3, closed:4 };
    const sortFns = {
      overdue: (a,b) => {
        const sa = entregaStatus(a), sb = entregaStatus(b);
        const o = statusOrderOverdue[sa] - statusOrderOverdue[sb];
        if(o !== 0) return o;
        const da = diasACierre(a), db = diasACierre(b);
        if(da == null && db == null) return 0;
        if(da == null) return 1;
        if(db == null) return -1;
        return da - db;
      },
      dueSoon: (a,b) => {
        const sa = entregaStatus(a), sb = entregaStatus(b);
        const o = statusOrderDueSoon[sa] - statusOrderDueSoon[sb];
        if(o !== 0) return o;
        const da = diasACierre(a), db = diasACierre(b);
        if(da == null && db == null) return 0;
        if(da == null) return 1;
        if(db == null) return -1;
        return da - db;
      },
      marginDesc: (a,b) => {
        const ma = marginActCalc(a), mb = marginActCalc(b);
        if(ma == null && mb == null) return 0;
        if(ma == null) return 1;
        if(mb == null) return -1;
        return mb - ma;
      },
    };
    all.sort(sortFns[sortVal] || sortFns.overdue);

    const titleMap = {
      overdue: 'Vencidos primero',
      dueSoon: 'Próximos a vencer',
      marginDesc: 'Mayor margen actual'
    };
    html += `
      <div class="ed-section">
        <div class="ed-header">
          <div>
            <div class="ed-title">${titleMap[sortVal]||'Proyectos'}</div>
            <div class="ed-pm">${all.length} proyecto${all.length!==1?'s':''} · ordenamiento global</div>
          </div>
          <div class="ed-line"></div>
        </div>
        <div class="ficha-grid">`;
    all.forEach(p => { html += renderFichaCard(p, true); });
    html += `</div></div>`;
  }

  return html;
}

// ── RENDER FICHA INDIVIDUAL ─────────────────────────────────────────────────
function renderFichaCard(p, showPM){
  const status = entregaStatus(p);
  const statusLabels = {
    ok:'A tiempo', warn:'Próximo a vencer', overdue:'Vencido',
    closed:'Cerrado', none:'Sin fecha'
  };
  const statusClasses = {
    ok:'status-ok', warn:'status-warn', overdue:'status-overdue',
    closed:'status-closed', none:'status-closed'
  };

  const cursosPct = (p.cursos > 0 && p.cursosAprobados !== null) ? p.cursosAprobados / p.cursos : null;
  const recPct    = (p.totalRec > 0) ? p.recHechos / p.totalRec : null;
  const mPlan = marginPlanCalc(p);
  const mAct  = marginActCalc(p);

  const fillCls = pct => pct === null ? 'gris' : pct >= 0.7 ? 'verde' : pct >= 0.25 ? 'amarillo' : 'rojo';
  const PEND = '<span class="pendiente">Pendiente</span>';

  const fechaEntregaHTML = p.fechaCierre ? fmtFechaCorta(p.fechaCierre) : PEND;

  const cursosBlock = cursosPct === null
    ? `<div class="progress-value pendiente-val">${PEND}</div>
       <div class="progress-bar"><div class="progress-fill gris" style="width:0%"></div></div>`
    : `<div class="progress-value">${Math.round(cursosPct*100)}%</div>
       <div class="progress-bar"><div class="progress-fill ${fillCls(cursosPct)}" style="width:${Math.max(cursosPct*100, cursosPct>0?4:0)}%"></div></div>`;

  const recBlock = recPct === null
    ? `<div class="progress-value pendiente-val">${PEND}</div>
       <div class="progress-bar"><div class="progress-fill gris" style="width:0%"></div></div>`
    : `<div class="progress-value">${Math.round(recPct*100)}%</div>
       <div class="progress-bar"><div class="progress-fill ${fillCls(recPct)}" style="width:${Math.max(recPct*100, recPct>0?4:0)}%"></div></div>`;

  return `
    <div class="pcard ficha">
      <div class="pcard-stripe ${p.sem}"></div>
      <div class="pcard-head">
        <div class="pcard-top">
          <div style="min-width:0;flex:1;">
            <div class="pcard-cliente-label">Cliente</div>
            <div class="pcard-cliente">${p.cliente || PEND}</div>
            <div class="pcard-proyecto">${p.nombre || PEND}</div>
            <div class="pcard-entrega">Entrega planeada: ${fechaEntregaHTML}</div>
          </div>
          <div class="pcard-badges">
            ${showPM && p.pm ? `<span class="pm-pill">${p.pm}</span>` : ''}
            <span class="status-pill ${statusClasses[status]}">${statusLabels[status]}</span>
          </div>
        </div>
      </div>
      <div class="progress-block">
        <div class="progress">
          <div class="progress-label">Cursos aprobados</div>
          ${cursosBlock}
        </div>
        <div class="progress">
          <div class="progress-label">Recursos ejecutados</div>
          ${recBlock}
        </div>
      </div>
      ${p.alert?`<div class="alert-banner ${p.sem==='amarillo'?'warn':''}" style="margin:0 18px 12px;">⚠️ ${p.alert}</div>`:''}
      <div class="counts-grid">
        <div class="count-cell">
          <div class="count-label">Cursos planeados</div>
          <div class="count-value">${p.cursos > 0 ? p.cursos : PEND}</div>
        </div>
        <div class="count-cell">
          <div class="count-label">Cursos aprobados</div>
          <div class="count-value">${p.cursosAprobados !== null && p.cursos > 0 ? `${p.cursosAprobados} <span class="total">/ ${p.cursos}</span>` : PEND}</div>
        </div>
        <div class="count-cell">
          <div class="count-label">Recursos planeados</div>
          <div class="count-value">${p.totalRec > 0 ? p.totalRec : PEND}</div>
        </div>
        <div class="count-cell">
          <div class="count-label">Recursos ejecutados</div>
          <div class="count-value">${p.totalRec > 0 ? `${p.recHechos} <span class="total">/ ${p.totalRec}</span>` : PEND}</div>
        </div>
      </div>
      <div class="finance">
        <div class="finance-title">Finanzas</div>
        <div class="money-row">
          <div class="money"><div class="money-label">Valor contrato</div><div class="money-value">${p.valorContrato !== null ? fmtMoney(p.valorContrato) : PEND}</div></div>
          <div class="money"><div class="money-label">Presupuesto</div><div class="money-value">${p.presupuesto !== null ? fmtMoney(p.presupuesto) : PEND}</div></div>
          <div class="money"><div class="money-label">Costos ejec.</div><div class="money-value">${p.costosEjec !== null ? fmtMoney(p.costosEjec) : PEND}</div></div>
        </div>
        <div class="margin-row">
          <div class="margin-box planned">
            <div class="margin-label">Margen planeado</div>
            <div class="margin-value">${mPlan !== null ? fmtMargin(mPlan) : PEND}</div>
          </div>
          <div class="margin-box actual ${marginClassFn(mAct, mPlan)}">
            <div class="margin-label">Margen actual</div>
            <div class="margin-value">${mAct !== null ? fmtMargin(mAct) : PEND}</div>
            ${marginDeltaText(mAct, mPlan, status)}
          </div>
        </div>
      </div>
    </div>`;
}

// ── VISTA TABLA (FICHA REDESIGN 2026-05-04) ──────────────────────────────────
function renderTabla(filtered){
  let html = `
  <div style="background:var(--white);border:1px solid var(--mid);border-radius:var(--r);box-shadow:var(--sh);overflow-x:auto;">
    <table class="detail-table">
      <thead>
        <tr>
          <th>Cliente / Proyecto</th>
          <th>ED / PM</th>
          <th>Semáforo</th>
          <th style="min-width:140px;">Avance</th>
          <th>Recursos</th>
          <th>Cierre</th>
          <th>Ppto</th>
          <th>AC</th>
          <th>Margen $</th>
          <th>Margen %</th>
          <th>Alerta</th>
        </tr>
      </thead>
      <tbody>`;

  const semOrder = {rojo:0,amarillo:1,verde:2,gris:3};
  const allProy = Object.entries(filtered)
    .flatMap(([pm,proyectos])=>proyectos.map(p=>({...p,pm})))
    .sort((a,b)=>semOrder[a.sem]-semOrder[b.sem]);

  const PEND_TD = '<span class="pendiente">Pendiente</span>';

  allProy.forEach(p => {
    const diasCierre = p.fechaCierre ? Math.round((new Date(p.fechaCierre+'T12:00:00')-new Date())/(1000*3600*24)) : null;
    const diasClass = diasCierre===null?'neutral':diasCierre>30?'ok':diasCierre>14?'warn':'bad';
    const fechaFmt = p.fechaCierre ? new Date(p.fechaCierre+'T12:00:00').toLocaleDateString('es-CO',{day:'numeric',month:'short'}) : '—';

    // Datos financieros — muestran "Pendiente" si null
    const presupHTML = p.presupuesto !== null ? fmtMoney(p.presupuesto) : PEND_TD;
    const acHTML     = p.costosEjec  !== null ? fmtMoney(p.costosEjec)  : PEND_TD;
    const margenAbs  = (p.valorContrato !== null && p.costosEjec !== null) ? p.valorContrato - p.costosEjec : null;
    const margenPct  = marginActCalc(p);
    const margenPlan = marginPlanCalc(p);
    const margenAbsHTML = margenAbs !== null ? fmtMoney(margenAbs) : PEND_TD;
    const margenCls = marginClassFn(margenPct, margenPlan);
    const pillClass = margenCls === 'good' ? 'ok' : margenCls === 'warn' ? 'warn' : margenCls === 'bad' ? 'bad' : 'neutral';
    const margenPctHTML = margenPct !== null ? `<span class="pill ${pillClass}">${fmtMargin(margenPct)}</span>` : PEND_TD;

    html += `
      <tr>
        <td>
          <div style="font-weight:700;color:var(--navy);font-size:13px;">${p.cliente}</div>
          <div style="font-size:11px;color:var(--gray);">${p.nombre}</div>
        </td>
        <td style="font-size:12px;color:var(--gray);">${p.pm}</td>
        <td>
          <span class="sem-badge ${p.sem}" style="font-size:10px;">
            ${p.sem==='verde'?'🟢 Verde':p.sem==='amarillo'?'🟡 Amarillo':p.sem==='gris'?'⚪ Sin datos':'🔴 Rojo'}
          </span>
        </td>
        <td>
          <div class="mini-prog">
            <div class="mini-bar"><div class="mini-fill ${p.sem}" style="width:${p.avance}%"></div></div>
            <div class="mini-pct">${p.avance}%</div>
          </div>
        </td>
        <td style="font-size:12px;">${p.totalRec > 0 ? `${p.recHechos}/${p.totalRec}` : PEND_TD}</td>
        <td>
          <div style="font-size:12px;font-weight:600;">${fechaFmt}</div>
          ${diasCierre!==null?`<div class="pill ${diasClass}" style="margin-top:3px;">${diasCierre}d</div>`:''}
        </td>
        <td style="font-size:12px;font-weight:600;color:var(--navy);white-space:nowrap;">${presupHTML}</td>
        <td style="font-size:12px;font-weight:600;color:var(--navy);white-space:nowrap;">${acHTML}</td>
        <td style="font-size:12px;font-weight:600;color:var(--navy);white-space:nowrap;">${margenAbsHTML}</td>
        <td style="white-space:nowrap;">${margenPctHTML}</td>
        <td style="font-size:11px;color:${p.alert?'var(--red)':'var(--gray)'};">
          ${p.alert?'⚠️ '+p.alert.substring(0,40)+'…':'—'}
        </td>
      </tr>`;
  });

  html += `</tbody></table></div>`;
  return html;
}
</script>
</body>
</html>
